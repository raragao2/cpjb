// UTILITÁRIO: HASH DE SENHA (Web Crypto API — sem dependências)
// ============================================================
async function hashPassword(password) {
    const msgBuffer = new TextEncoder().encode(password);
    const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
    const hashArray = Array.from(new Uint8Array(hashBuffer));
    return hashArray.map(b => b.toString(16).padStart(2,'0')).join('');
}

async function verifyPassword(plain, hash) {
    const h = await hashPassword(plain);
    return h === hash;
}

    if (stored && stored[0] && stored[0].passwordHash && stored[0].passwordHash.length === 64) {
        appState.users = stored;
        return;
    }
    // Primeira vez: cria hashes dos defaults
    const rawPasswords = { admin:'admin', presidente:'pres123', tesoureiro:'tes123', cambono:'cam123', cozinha:'coz123', tecidos:'tec123', secretaria:'sec123', medium:'med123' };

function addLog(action) {
    const now = new Date();
    const dateStr = now.toLocaleDateString('pt-BR') + ' ' + now.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
    appState.logs.unshift({ id:'l'+Date.now(), user: appState.currentUser?.username||'Sistema', action, timestamp:dateStr });
    if (appState.logs.length > 200) appState.logs = appState.logs.slice(0, 200);
    saveState();
}

function exportData() {
    const backup = {
        version: 2,
        exportedAt: new Date().toISOString(),
        terreiro: appState.config.terreiroName,
        users: appState.users,
        groups: appState.contributionGroups,
        transactions: appState.transactions,
        finCategories: appState.finCategories,
        stock: appState.stock,
        stockCategories: appState.stockCategories,
        freezers: appState.freezers,
        foods: appState.foods,
        caixotes: appState.caixotes,
        fabrics: appState.fabrics,
        schedule: appState.schedule,
        notices: appState.notices,
        presencas: appState.presencas,
        config: appState.config
    };
    const blob = new Blob([JSON.stringify(backup, null, 2)], { type:'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `backup-paijose-${new Date().toISOString().split('T')[0]}.json`;
    a.click();
    URL.revokeObjectURL(url);
    addLog('Exportou backup completo dos dados do sistema');
    showNotification('Backup Exportado', 'Arquivo JSON salvo com sucesso. Guarde em local seguro.', 'success');
}

function importData(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
        try {
            const data = JSON.parse(e.target.result);
            if (!data.version || !data.users) throw new Error('Arquivo inválido');
            openModal('Confirmar Importação', `
                <div class="space-y-4 text-xs">
                    <div class="p-4 bg-amber-50 border border-amber-200 rounded-xl">
                        <p class="font-bold text-amber-800 mb-1">⚠️ Atenção</p>
                        <p class="text-amber-700">Esta ação irá substituir <strong>todos os dados atuais</strong> pelo backup selecionado. Esta operação não pode ser desfeita.</p>
                    </div>
                    <p class="text-stone-600">Backup de: <strong>${data.terreiro || 'Terreiro'}</strong></p>
                    <p class="text-stone-600">Exportado em: <strong>${new Date(data.exportedAt).toLocaleString('pt-BR')}</strong></p>
                    <p class="text-stone-600">Médiuns: <strong>${data.users?.length || 0}</strong> | Transações: <strong>${data.transactions?.length || 0}</strong></p>
                    <div class="pt-4 flex justify-end gap-2 border-t border-stone-100">
                        <button onclick="closeModal()" class="px-4 py-2 bg-stone-100 text-stone-600 rounded-xl font-bold">Cancelar</button>
                        <button onclick="confirmImport(${JSON.stringify(data).replace(/'/g,"\\'")})" class="px-4 py-2 bg-red-600 hover:bg-red-700 text-white rounded-xl font-bold">Confirmar Importação</button>
                    </div>
                </div>
            `);
        } catch(err) {
            showNotification('Erro de Importação', 'Arquivo JSON inválido ou corrompido.', 'error');
        }
    };
    reader.readAsText(file);
    event.target.value = '';
}

function confirmImport(data) {
    if (data.users) appState.users = data.users;
    if (data.groups) appState.contributionGroups = data.groups;
    if (data.transactions) appState.transactions = data.transactions;
    if (data.finCategories) appState.finCategories = data.finCategories;
    if (data.stock) appState.stock = data.stock;
    if (data.stockCategories) appState.stockCategories = data.stockCategories;
    if (data.freezers) appState.freezers = data.freezers;
    if (data.foods) appState.foods = data.foods;
    if (data.caixotes) appState.caixotes = data.caixotes;
    if (data.fabrics) appState.fabrics = data.fabrics;
    if (data.schedule) appState.schedule = data.schedule;
    if (data.notices) appState.notices = data.notices;
    if (data.presencas) appState.presencas = data.presencas;
    if (data.config) appState.config = data.config;
    saveState();
    closeModal();
    showNotification('Importação Concluída', 'Dados restaurados com sucesso!', 'success');
    setTimeout(() => location.reload(), 1500);
}

// 4. RBAC
// ============================================================
function hasReadAccess(user, tab) {
    if (!user) return false;
    if (user.cargo === 'ADMIN') return true;
    if ((user.cargo === 'PRESIDENTE' || user.cargo === 'TESOUREIRO') && tab !== 'admin') return true;
    return user.allowedTabs?.includes(tab) || false;
}
function hasWriteAccess(user, tab) {
    if (!user) return false;
    if (user.cargo === 'ADMIN') return true;
    if ((user.cargo === 'PRESIDENTE' || user.cargo === 'TESOUREIRO') && tab !== 'admin') return true;
    if (user.cargo === 'SECRETARIA' && ['secretaria','mediuns','presenca'].includes(tab)) return true;
    if (user.allowedTabs?.includes(tab)) {
        if (user.cargo === 'CAMBONAGEM' && tab === 'estoque') return true;
        if (user.cargo === 'COZINHA' && tab === 'cozinha') return true;
        if (user.cargo === 'TECIDOS' && tab === 'tecidos') return true;
    }
    return false;
}
function canModifyPermissions(user) {
    return ['ADMIN','PRESIDENTE','TESOUREIRO'].includes(user?.cargo);
}

function showNotification(title, message, type='info') {
    const container = document.getElementById('notification-container');
    if (!container) return;
    const id = 'notif-'+Date.now();
    const colors = { success:'border-amber-500/30', error:'border-red-500/30', warning:'border-amber-500/30', info:'border-stone-700' };
    const n = document.createElement('div');
    n.id = id;
    n.className = `bg-stone-900 border ${colors[type]||colors.info} text-white p-4 rounded-2xl shadow-xl flex items-start gap-3 smooth-transition opacity-0 translate-x-8 pointer-events-auto max-w-sm w-full`;
    n.innerHTML = `<div class="shrink-0 mt-0.5 ${type==='error'?'text-red-400':'text-amber-500'}"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg></div><div class="flex-1"><h4 class="font-bold text-sm text-stone-100">${title}</h4><p class="text-xs text-stone-300 mt-1 leading-relaxed">${message}</p></div><button onclick="dismissNotification('${id}')" class="text-stone-400 hover:text-white"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg></button>`;
    container.appendChild(n);
    setTimeout(() => { n.classList.remove('opacity-0','translate-x-8'); }, 10);
    setTimeout(() => dismissNotification(id), 5000);
}
function dismissNotification(id) {
    const n = document.getElementById(id);
    if (n) { n.classList.add('opacity-0','translate-x-8'); setTimeout(() => n.remove(), 300); }
}

function quickLogin(u, p) {
    document.getElementById('login-username').value = u;
    document.getElementById('login-password').value = p;
    handleLoginSubmit();
}
function toggleSimulador() {
    const c = document.getElementById('simulador-content');
    const ch = document.getElementById('simulador-chevron');
    c.classList.toggle('hidden');
    ch.innerText = c.classList.contains('hidden') ? '▼' : '▲';
}

async function handleLoginSubmit(e) {
    if (e) e.preventDefault();
    const u = document.getElementById('login-username').value.trim();
    const p = document.getElementById('login-password').value.trim();
    if (!appState.users) { showNotification('Aguarde', 'Sistema iniciando...', 'info'); return; }
    
    const found = appState.users.find(x => x.username.toLowerCase() === u.toLowerCase());
    if (!found) { showNotification('Acesso Negado', 'Usuário ou senha incorreta.', 'error'); return; }
    
    const ok = await verifyPassword(p, found.passwordHash);
    if (!ok) { showNotification('Acesso Negado', 'Usuário ou senha incorreta.', 'error'); return; }
    
    appState.currentUser = found;
    addLog('Entrou no sistema');
    showNotification('Saravá, axé!', `Bem-vindo(a), ${found.name}!`, 'success');
    document.getElementById('login-screen').classList.add('hidden');
    document.getElementById('app-screen').classList.remove('hidden');
    document.getElementById('sidebar-title').innerText = appState.config.terreiroName;
    document.getElementById('sidebar-subtitle').innerText = appState.config.subtitle;
    document.getElementById('user-display-name').innerText = found.name;
    document.getElementById('user-display-role').innerText = found.cargo;
    document.getElementById('mobile-user-role').innerText = found.cargo;
    updateLogos();
    const allowed = found.allowedTabs || ['dashboard','hub'];
    appState.activeTab = allowed.includes('dashboard') ? 'dashboard' : allowed[0] || 'hub';
    buildNavigation();
    switchTab(appState.activeTab);
}

function logout() {
    addLog('Saiu do sistema');
    appState.currentUser = null;
    document.getElementById('app-screen').classList.add('hidden');
    document.getElementById('login-screen').classList.remove('hidden');
    document.getElementById('login-form').reset();
    showNotification('Sessão Encerrada', 'Que Pai José guie seus passos.', 'info');
}

function buildNavigation() {
    const nav = document.getElementById('navigation-tabs');
    if (!nav) return;
    nav.innerHTML = '';
    Object.keys(TABS_CONFIG).forEach(tabKey => {
        if (!hasReadAccess(appState.currentUser, tabKey)) return;
        const cfg = TABS_CONFIG[tabKey];
        const btn = document.createElement('button');
        btn.id = `nav-btn-${tabKey}`;
        btn.onclick = () => switchTab(tabKey);
        btn.className = `w-full flex items-center gap-3 px-4 py-3 rounded-xl font-semibold text-sm text-left smooth-transition group`;
        btn.innerHTML = `<svg class="w-5 h-5 shrink-0 text-stone-400 group-hover:text-amber-600 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="${cfg.icon}"/></svg><span>${cfg.label}</span>`;
        nav.appendChild(btn);
    });
}

function switchTab(tabKey) {
    appState.activeTab = tabKey;
    Object.keys(TABS_CONFIG).forEach(t => {
        const btn = document.getElementById(`nav-btn-${t}`);
        if (!btn) return;
        if (t === tabKey) {
            btn.className = `w-full flex items-center gap-3 px-4 py-3 rounded-xl font-bold text-sm text-left bg-amber-500/10 text-amber-800 border-l-4 border-amber-500 shadow-sm smooth-transition`;
            btn.querySelector('svg').className = "w-5 h-5 shrink-0 text-amber-600";
        } else {
            btn.className = `w-full flex items-center gap-3 px-4 py-3 rounded-xl font-semibold text-sm text-left text-stone-600 hover:bg-stone-100 hover:text-stone-900 smooth-transition group`;
            btn.querySelector('svg').className = "w-5 h-5 shrink-0 text-stone-400 group-hover:text-amber-600 transition-colors";
        }
    });
    renderCurrentTab();
}

    const tab = appState.activeTab;
    const hasWrite = hasWriteAccess(appState.currentUser, tab);
    const map = { dashboard:renderDashboard, financeiro:renderFinanceiro, estoque:renderEstoque, cozinha:renderCozinha, tecidos:renderTecidos, secretaria:renderSecretaria, mediuns:renderMediuns, presenca:renderPresenca, hub:renderHub, admin:renderAdmin };

    else ws.innerHTML = `<div class="p-8 text-center text-stone-400">Em desenvolvimento.</div>`;

// ---- DASHBOARD ----
function renderDashboard(container) {
    const user = appState.currentUser;
    const isManager = ['ADMIN','PRESIDENTE','TESOUREIRO'].includes(user.cargo);
    const saldo = appState.transactions.reduce((a,t) => t.type==='entrada' ? a+t.amount : a-t.amount, 0);
    const criticos = appState.stock.filter(i => i.quantity <= i.minQuantity).length;

    // Aniversariantes do mês
    const today = new Date();
    const mesAtual = today.getMonth()+1;
    const aniversariantes = appState.users.filter(u => {
        if (!u.birthday) return false;
        const m = parseInt(u.birthday.split('-')[1]);
        return m === mesAtual;
    }).sort((a,b) => parseInt(a.birthday.split('-')[2]) - parseInt(b.birthday.split('-')[2]));

    const birthdayHTML = aniversariantes.length > 0 ?
        aniversariantes.map(u => {
            const day = u.birthday.split('-')[2];
            return `<div class="flex items-center gap-2 py-1.5 border-b border-stone-100 last:border-0 text-xs"><span class="font-bold text-amber-700 w-6 shrink-0">${day}</span><span class="text-stone-700 font-medium">${u.name}</span></div>`;
        }).join('') :
        `<p class="text-xs text-stone-400 text-center py-2">Sem aniversariantes este mês.</p>`;

    // Cards condicionais
    let metricsHTML = '';
    if (hasReadAccess(user,'financeiro')||isManager) {
        metricsHTML += `<div class="bg-white p-5 rounded-2xl shadow-sm border border-stone-200 flex items-center justify-between"><div><span class="block text-xs font-semibold text-stone-400 uppercase tracking-wider">Saldo do Caixa</span><span class="text-xl font-extrabold ${saldo>=0?'text-emerald-600':'text-red-600'}">R$ ${saldo.toFixed(2)}</span></div><div class="p-3 rounded-xl bg-stone-50 text-stone-600 border border-stone-100">💰</div></div>`;
    }
    if (hasReadAccess(user,'estoque')||isManager) {
        metricsHTML += `<div class="bg-white p-5 rounded-2xl shadow-sm border border-stone-200 flex items-center justify-between"><div><span class="block text-xs font-semibold text-stone-400 uppercase tracking-wider">Almoxarifado</span><span class="text-xl font-extrabold text-stone-900">${appState.stock.reduce((a,i)=>a+i.quantity,0)} un</span>${criticos>0?`<span class="block text-[10px] text-red-500 font-bold mt-1">${criticos} sob limite crítico</span>`:'<span class="block text-[10px] text-stone-400 mt-1">Estoque adequado</span>'}</div><div class="p-3 rounded-xl bg-stone-50 text-stone-600 border border-stone-100">📦</div></div>`;
    }

// ---- FINANCEIRO (com gráficos) ----
let filterMonth='', filterCategory='';
function filterFinMonth(v) { filterMonth=v; renderCurrentTab(); }
function filterFinCategory(v) { filterCategory=v; renderCurrentTab(); }

function renderFinanceiro(container, hasWrite) {
    const entradas = appState.transactions.filter(t=>t.type==='entrada').reduce((a,t)=>a+t.amount,0);
    const saidas = appState.transactions.filter(t=>t.type==='saida').reduce((a,t)=>a+t.amount,0);
    const saldo = entradas - saidas;

    // Dados por mês para gráfico (últimos 6 meses)
    const monthlyData = {};
    appState.transactions.forEach(t => {
        const [y,m] = t.date.split('-');
        const key = `${y}-${m}`;
        if (!monthlyData[key]) monthlyData[key] = { entradas:0, saidas:0 };
        if (t.type==='entrada') monthlyData[key].entradas += t.amount;
        else monthlyData[key].saidas += t.amount;
    });
    const sortedKeys = Object.keys(monthlyData).sort().slice(-6);
    const chartLabels = sortedKeys.map(k => { const [y,m] = k.split('-'); return new Date(y,m-1).toLocaleString('pt-BR',{month:'short',year:'2-digit'}); });
    const chartEntradas = sortedKeys.map(k => monthlyData[k].entradas);
    const chartSaidas = sortedKeys.map(k => monthlyData[k].saidas);

    // Por categoria (donut)
    const byCat = {};
    appState.transactions.filter(t=>t.type==='saida').forEach(t => { byCat[t.category] = (byCat[t.category]||0)+t.amount; });
    const catLabels = Object.keys(byCat);
    const catData = catLabels.map(k => byCat[k]);

    let filtradas = appState.transactions;
    if (filterMonth) filtradas = filtradas.filter(t => t.date.split('-')[1] === filterMonth);
    if (filterCategory) filtradas = filtradas.filter(t => t.category === filterCategory);

    const mensalidadesHTML = appState.users.map(u => `<div class="flex items-center justify-between p-3 rounded-xl border border-stone-100 bg-white text-xs"><div class="min-w-0 flex-1 pr-2"><span class="font-bold text-stone-800 block truncate">${u.name}</span><span class="text-[10px] text-stone-400">R$ ${(u.duesItems||[]).reduce((a,c)=>a+c.value,0).toFixed(2)}</span></div><div class="flex items-center gap-2 shrink-0"><span class="px-2 py-0.5 rounded font-bold text-[10px] ${u.duesStatus==='Em Dia'?'bg-emerald-50 text-emerald-800':'bg-red-50 text-red-800'}">${u.duesStatus}</span>${hasWrite&&u.duesStatus!=='Em Dia'?`<button onclick="settleDues('${u.id}')" class="px-2 py-1 bg-amber-500 text-stone-950 font-bold rounded-lg text-[10px]">Quitar</button>`:''}</div></div>`).join('');

    const historicoHTML = filtradas.length ? filtradas.map(t => `<tr class="hover:bg-stone-50/50 text-xs border-b border-stone-100"><td class="px-4 py-3 text-stone-500">${t.date}</td><td class="px-4 py-3 font-bold ${t.type==='entrada'?'text-emerald-600':'text-red-500'}">${t.type==='entrada'?'+':'-'} R$ ${t.amount.toFixed(2)}</td><td class="px-4 py-3"><span class="px-2 py-0.5 rounded bg-stone-100 text-stone-700 font-bold text-[10px] border border-stone-200">${t.category}</span></td><td class="px-4 py-3 text-stone-700 font-light max-w-xs truncate">${t.description}</td><td class="px-4 py-3 text-stone-400">${t.user}</td>${hasWrite?`<td class="px-4 py-3 text-right"><button onclick="deleteTransaction('${t.id}')" class="text-xs text-stone-400 hover:text-red-600 font-medium">Remover</button></td>`:'<td></td>'}</tr>`).join('') :
        `<tr><td colspan="6" class="px-4 py-8 text-center text-stone-400 text-xs">Sem lançamentos encontrados.</td></tr>`;

    container.innerHTML = `
        <div class="mb-6 flex flex-col md:flex-row justify-between items-start gap-2">
            <div><h1 class="font-cinzel text-2xl font-bold text-stone-900">Financeiro</h1><p class="text-xs text-stone-500">Livro caixa, controle orçamentário e mensalidades</p></div>
            ${hasWrite?`<div class="flex flex-wrap gap-2">
                <button onclick="openCreateGroupModal()" class="px-3 py-2 border border-stone-300 text-stone-700 text-xs font-bold rounded-xl hover:bg-stone-100 uppercase">Criar Grupo</button>
                <button onclick="openNewChargeModal()" class="px-3 py-2 bg-amber-500 text-stone-950 text-xs font-bold rounded-xl uppercase shadow">Lançar Cobrança</button>
                <button onclick="openTransactionModal()" class="px-4 py-2 bg-stone-900 text-white text-xs font-bold rounded-xl uppercase shadow">Lançar Caixa</button>
            </div>`:''}
        </div>

        <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
            <div class="bg-white p-5 rounded-2xl border border-stone-200 shadow-sm"><span class="block text-[10px] uppercase font-bold text-stone-400 tracking-wider">Entradas</span><span class="text-xl font-extrabold text-emerald-600 block mt-1">R$ ${entradas.toFixed(2)}</span></div>
            <div class="bg-white p-5 rounded-2xl border border-stone-200 shadow-sm"><span class="block text-[10px] uppercase font-bold text-stone-400 tracking-wider">Saídas</span><span class="text-xl font-extrabold text-red-500 block mt-1">R$ ${saidas.toFixed(2)}</span></div>
            <div class="bg-white p-5 rounded-2xl border border-stone-200 shadow-sm"><span class="block text-[10px] uppercase font-bold text-stone-400 tracking-wider">Balanço</span><span class="text-xl font-extrabold ${saldo>=0?'text-amber-600':'text-red-700'} block mt-1">R$ ${saldo.toFixed(2)}</span></div>
            <div class="bg-white p-5 rounded-2xl border border-stone-200 shadow-sm"><span class="block text-[10px] uppercase font-bold text-stone-400 tracking-wider">Inadimplentes</span><span class="text-xl font-extrabold text-stone-900 block mt-1">${appState.users.filter(u=>u.duesStatus==='Pendente').length} médiuns</span></div>
        </div>

        <!-- Gráficos -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-6">
            <div class="lg:col-span-2 bg-white p-5 rounded-2xl border border-stone-200 shadow-sm">
                <h3 class="font-cinzel text-sm font-bold text-stone-900 mb-4">Evolução Financeira (últimos 6 meses)</h3>
                <div class="chart-container" style="height:220px"><canvas id="chartBarFinanceiro"></canvas></div>
            </div>
            <div class="bg-white p-5 rounded-2xl border border-stone-200 shadow-sm">
                <h3 class="font-cinzel text-sm font-bold text-stone-900 mb-4">Saídas por Categoria</h3>
                <div class="chart-container" style="height:220px"><canvas id="chartDonutCategoria"></canvas></div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="lg:col-span-2 bg-white p-5 rounded-2xl border border-stone-200 shadow-sm">
                <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 border-b border-stone-100 pb-4 mb-4">
                    <h3 class="font-cinzel text-sm font-bold text-stone-900">Livro Caixa</h3>
                    <div class="flex flex-wrap gap-2">
                        <select onchange="filterFinMonth(this.value)" class="px-3 py-1.5 text-xs bg-stone-50 border border-stone-200 rounded-lg focus:outline-none">
                            <option value="">Todos os meses</option>
                            ${['01','02','03','04','05','06','07','08','09','10','11','12'].map((m,i)=>`<option value="${m}" ${filterMonth===m?'selected':''}>${['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'][i]}</option>`).join('')}
                        </select>
                        <select onchange="filterFinCategory(this.value)" class="px-3 py-1.5 text-xs bg-stone-50 border border-stone-200 rounded-lg focus:outline-none">
                            <option value="">Todas as categorias</option>
                            ${appState.finCategories.map(c=>`<option value="${c}" ${filterCategory===c?'selected':''}>${c}</option>`).join('')}
                        </select>
                        <button onclick="exportRelatorio()" class="px-3 py-1.5 text-xs bg-stone-100 hover:bg-stone-200 border border-stone-200 rounded-lg font-bold text-stone-700">📥 Exportar CSV</button>
                    </div>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead><tr class="bg-stone-50 text-[10px] font-bold uppercase tracking-wider text-stone-400 border-b border-stone-200"><th class="px-4 py-3">Data</th><th class="px-4 py-3">Valor</th><th class="px-4 py-3">Categoria</th><th class="px-4 py-3">Descrição</th><th class="px-4 py-3">Médium</th><th class="px-4 py-3"></th></tr></thead>
                        <tbody>${historicoHTML}</tbody>
                    </table>
                </div>
            </div>
            <div class="space-y-6">
                <div class="bg-white p-5 rounded-2xl border border-stone-200 shadow-sm">
                    <h3 class="font-cinzel text-sm font-bold text-stone-900 border-b border-stone-100 pb-2 mb-4">Mensalidades</h3>
                    <div class="space-y-2 max-h-[300px] overflow-y-auto pr-1">${mensalidadesHTML}</div>
                </div>
            </div>
        </div>`;

    // Inicializa gráficos após DOM estar pronto
    setTimeout(() => {
        const ctxBar = document.getElementById('chartBarFinanceiro');
        const ctxDonut = document.getElementById('chartDonutCategoria');
        if (ctxBar) {
            new Chart(ctxBar, {
                type:'bar',
                data: { labels:chartLabels, datasets:[
                    { label:'Entradas', data:chartEntradas, backgroundColor:'rgba(16,185,129,0.7)', borderRadius:6 },
                    { label:'Saídas', data:chartSaidas, backgroundColor:'rgba(239,68,68,0.7)', borderRadius:6 }
                ]},
                options: { responsive:true, maintainAspectRatio:false, plugins:{ legend:{ position:'top', labels:{ font:{size:11}, boxWidth:12 }}}, scales:{ x:{ grid:{display:false}, ticks:{font:{size:11}} }, y:{ ticks:{ callback:v=>`R$${v}`, font:{size:11} }, grid:{ color:'rgba(0,0,0,0.05)' }}}}
            });
        }
        if (ctxDonut && catLabels.length > 0) {
            new Chart(ctxDonut, {
                type:'doughnut',
                data: { labels:catLabels, datasets:[{ data:catData, backgroundColor:['#f59e0b','#ef4444','#3b82f6','#10b981','#8b5cf6','#f97316'], borderWidth:0 }]},
                options: { responsive:true, maintainAspectRatio:false, plugins:{ legend:{ position:'bottom', labels:{ font:{size:10}, boxWidth:10, padding:8 }}}}
            });
        }
    }, 50);
}

function exportRelatorio() {
    let filtradas = appState.transactions;
    if (filterMonth) filtradas = filtradas.filter(t => t.date.split('-')[1] === filterMonth);
    if (filterCategory) filtradas = filtradas.filter(t => t.category === filterCategory);
    const header = 'Data,Tipo,Valor,Categoria,Descrição,Médium\n';
    const rows = filtradas.map(t => `${t.date},${t.type},${t.amount.toFixed(2)},${t.category},"${t.description}",${t.user}`).join('\n');
    const blob = new Blob(['\uFEFF'+header+rows], { type:'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href=url; a.download=`financeiro-${new Date().toISOString().split('T')[0]}.csv`; a.click();
    URL.revokeObjectURL(url);
    showNotification('CSV Exportado', 'Relatório financeiro gerado com sucesso.', 'success');
}

// Funções financeiras auxiliares
function openTransactionModal() {
    const opts = appState.finCategories.map(c=>`<option value="${c}">${c}</option>`).join('');
    openModal('Lançar Movimentação', `<form id="modal-transaction-form" onsubmit="handleNewTransaction(event)" class="space-y-4 text-xs">
        <div class="grid grid-cols-2 gap-4">
            <div><label class="block font-bold text-stone-500 uppercase mb-1">Tipo</label><select id="t-type" required class="w-full p-2.5 bg-stone-50 border border-stone-200 rounded-xl focus:outline-none"><option value="entrada">Entrada (+)</option><option value="saida">Saída (-)</option></select></div>
            <div><label class="block font-bold text-stone-500 uppercase mb-1">Valor (R$)</label><input type="number" step="0.01" min="0.01" id="t-amount" required class="w-full p-2.5 bg-stone-50 border border-stone-200 rounded-xl focus:outline-none" placeholder="0.00"></div>
        </div>
        <div><label class="block font-bold text-stone-500 uppercase mb-1">Categoria</label><div class="flex gap-2"><select id="t-category" required class="flex-1 p-2.5 bg-stone-50 border border-stone-200 rounded-xl focus:outline-none">${opts}</select><button type="button" onclick="promptNewCategory('fin')" class="px-3 bg-stone-100 hover:bg-stone-200 text-stone-900 rounded-xl font-bold">+ Nova</button></div></div>
        <div><label class="block font-bold text-stone-500 uppercase mb-1">Data</label><input type="date" id="t-date" required class="w-full p-2.5 bg-stone-50 border border-stone-200 rounded-xl focus:outline-none" value="${new Date().toISOString().split('T')[0]}"></div>
        <div><label class="block font-bold text-stone-500 uppercase mb-1">Descrição</label><textarea id="t-desc" required class="w-full p-2.5 bg-stone-50 border border-stone-200 rounded-xl focus:outline-none h-20"></textarea></div>
        <div class="pt-4 flex justify-end gap-2 border-t border-stone-100"><button type="button" onclick="closeModal()" class="px-4 py-2 bg-stone-100 text-stone-600 rounded-xl font-bold">Cancelar</button><button type="submit" class="px-4 py-2 bg-stone-900 text-white rounded-xl font-bold">Registrar</button></div>
    </form>`);
}
function handleNewTransaction(e) {
    e.preventDefault();
    appState.transactions.unshift({ id:'t'+Date.now(), type:document.getElementById('t-type').value, amount:parseFloat(document.getElementById('t-amount').value), category:document.getElementById('t-category').value, date:document.getElementById('t-date').value, description:document.getElementById('t-desc').value.trim(), user:appState.currentUser.name });
    saveState(); addLog('Lançou movimentação financeira'); closeModal(); showNotification('Lançamento Registrado','','success'); renderCurrentTab();
}
function deleteTransaction(id) {
    const i = appState.transactions.findIndex(t=>t.id===id);
    if (i!==-1) { appState.transactions.splice(i,1); saveState(); addLog('Excluiu lançamento financeiro'); showNotification('Removido','','warning'); renderCurrentTab(); }
}
function settleDues(userId) {
    const u = appState.users.find(x=>x.id===userId);
    if (!u) return;
    const total = (u.duesItems||[]).reduce((a,c)=>a+c.value,0)||80;
    u.duesStatus='Em Dia'; u.duesItems=[];
    appState.transactions.unshift({ id:'t'+Date.now(), type:'entrada', amount:total, category:'Mensalidades', date:new Date().toISOString().split('T')[0], description:`Mensalidades quitadas — ${u.name}`, user:appState.currentUser.name });
    saveState(); addLog(`Quitou mensalidades: ${u.name}`); showNotification('Quitado',`R$ ${total.toFixed(2)} lançado no caixa`,'success'); renderCurrentTab();
}
function openCreateGroupModal() {
    const checks = appState.users.map(u=>`<label class="flex items-center gap-3 p-2 bg-stone-50 rounded-xl hover:bg-stone-100 cursor-pointer"><input type="checkbox" name="group-members" value="${u.id}" class="w-4 h-4 accent-amber-600"><span class="text-xs font-semibold">${u.name} (${u.cargo})</span></label>`).join('');
    openModal('Criar Grupo de Contribuição',`<form id="modal-group-form" onsubmit="handleCreateGroup(event)" class="space-y-4 text-xs"><div><label class="block font-bold text-stone-500 uppercase mb-1">Nome do Grupo</label><input type="text" id="g-modal-name" required class="w-full p-2.5 bg-stone-50 border border-stone-200 rounded-xl focus:outline-none" placeholder="Ex: Alabaças"></div><div><label class="block font-bold text-stone-500 uppercase mb-2">Membros</label><div class="space-y-2 max-h-48 overflow-y-auto border border-stone-200 p-2.5 rounded-xl bg-white">${checks}</div></div><div class="pt-4 flex justify-end gap-2 border-t border-stone-100"><button type="button" onclick="closeModal()" class="px-4 py-2 bg-stone-100 text-stone-600 rounded-xl font-bold">Cancelar</button><button type="submit" class="px-4 py-2 bg-stone-900 text-white rounded-xl font-bold">Salvar</button></div></form>`);
}
function handleCreateGroup(e) {
    e.preventDefault();
    const selected = [...document.getElementsByName('group-members')].filter(c=>c.checked).map(c=>c.value);
    if (!selected.length) { showNotification('Erro','Selecione ao menos um médium.','error'); return; }
    appState.contributionGroups.push({ id:'g'+Date.now(), name:document.getElementById('g-modal-name').value.trim(), members:selected });
    saveState(); addLog('Criou grupo de contribuição'); closeModal(); showNotification('Grupo Criado','','success'); renderCurrentTab();
}
function openNewChargeModal() {
    const groupOpts = appState.contributionGroups.map(g=>`<option value="${g.id}">${g.name}</option>`).join('');
    const userOpts = appState.users.map(u=>`<option value="${u.id}">${u.name}</option>`).join('');
    openModal('Lançar Cobrança',`<form id="modal-charge-form" onsubmit="handleNewCharge(event)" class="space-y-4 text-xs"><div><label class="block font-bold text-stone-500 uppercase mb-1">Título da Cobrança</label><input type="text" id="ch-title" required class="w-full p-2.5 bg-stone-50 border border-stone-200 rounded-xl focus:outline-none" placeholder="Ex: Mensalidade Junho"></div><div class="grid grid-cols-2 gap-3"><div><label class="block font-bold text-stone-500 uppercase mb-1">Valor (R$)</label><input type="number" step="0.01" min="0.01" id="ch-value" required class="w-full p-2.5 bg-stone-50 border border-stone-200 rounded-xl focus:outline-none"></div><div><label class="block font-bold text-stone-500 uppercase mb-1">Destinatários</label><select id="ch-target-type" required onchange="toggleChargeTargetInputs(this.value)" class="w-full p-2.5 bg-stone-50 border border-stone-200 rounded-xl focus:outline-none"><option value="all">Todos</option><option value="group">Grupo</option><option value="single">Individual</option></select></div></div><div id="target-group-container" class="hidden"><label class="block font-bold text-stone-500 uppercase mb-1">Grupo</label><select id="ch-target-group" class="w-full p-2.5 bg-stone-50 border border-stone-200 rounded-xl focus:outline-none">${groupOpts||'<option>Nenhum grupo</option>'}</select></div><div id="target-single-container" class="hidden"><label class="block font-bold text-stone-500 uppercase mb-1">Médium</label><select id="ch-target-single" class="w-full p-2.5 bg-stone-50 border border-stone-200 rounded-xl focus:outline-none">${userOpts}</select></div><div class="pt-4 flex justify-end gap-2 border-t border-stone-100"><button type="button" onclick="closeModal()" class="px-4 py-2 bg-stone-100 text-stone-600 rounded-xl font-bold">Cancelar</button><button type="submit" class="px-4 py-2 bg-stone-900 text-white rounded-xl font-bold">Lançar</button></div></form>`);
}
function toggleChargeTargetInputs(v) {
    document.getElementById('target-group-container').classList.toggle('hidden', v!=='group');
    document.getElementById('target-single-container').classList.toggle('hidden', v!=='single');
}
function handleNewCharge(e) {
    e.preventDefault();
    const title = document.getElementById('ch-title').value.trim();
    const value = parseFloat(document.getElementById('ch-value').value);
    const type = document.getElementById('ch-target-type').value;
    let targets = appState.users;
    if (type==='group') { const g = appState.contributionGroups.find(x=>x.id===document.getElementById('ch-target-group').value); targets = g ? appState.users.filter(u=>g.members.includes(u.id)) : []; }
    else if (type==='single') { targets = appState.users.filter(u=>u.id===document.getElementById('ch-target-single').value); }
    if (!targets.length) { showNotification('Erro','Nenhum destinatário encontrado.','error'); return; }
    targets.forEach(u => { if(!u.duesItems) u.duesItems=[]; u.duesItems.push({item:title,value}); u.duesStatus='Pendente'; });
    saveState(); addLog(`Lançou cobrança: "${title}" para ${targets.length} médiuns`); closeModal(); showNotification('Cobrança Lançada',`${targets.length} médium(ns) notificados`,'success'); renderCurrentTab();
}
function promptNewCategory(type) {
    openModal('Nova Categoria',`<div class="space-y-4 text-xs"><div><label class="block font-bold text-stone-500 uppercase mb-1">Nome da Categoria</label><input type="text" id="new-cat-input" class="w-full p-2.5 bg-stone-50 border border-stone-200 rounded-xl focus:outline-none" placeholder="Ex: Festividades de Iansã"></div><div class="pt-4 flex justify-end gap-2 border-t border-stone-100"><button onclick="closeModal()" class="px-4 py-2 bg-stone-100 text-stone-600 rounded-xl font-bold">Cancelar</button><button onclick="saveNewCategory('${type}')" class="px-4 py-2 bg-stone-900 text-white rounded-xl font-bold">Criar</button></div></div>`);
}
function saveNewCategory(type) {
    const v = document.getElementById('new-cat-input')?.value.trim();
    if (!v) return;
    if (type==='fin' && !appState.finCategories.includes(v)) { appState.finCategories.push(v); saveState(); }
    else if (type==='stock' && !appState.stockCategories.includes(v)) { appState.stockCategories.push(v); saveState(); }
    closeModal(); showNotification('Categoria Criada', v, 'success');
}

// ---- ALMOXARIFADO ----
let stockSearch='';
function renderEstoque(container, hasWrite) {
    let items = stockSearch ? appState.stock.filter(i=>i.name.toLowerCase().includes(stockSearch.toLowerCase())||i.category.toLowerCase().includes(stockSearch.toLowerCase())) : appState.stock;
    const listHTML = items.length ? items.map(item => {
        const crit = item.quantity <= item.minQuantity;
        return `<tr class="hover:bg-stone-50/50 text-xs border-b border-stone-100"><td class="px-4 py-3 font-bold text-stone-800">${item.name}</td><td class="px-4 py-3 text-stone-600">${item.category}</td><td class="px-4 py-3 text-stone-500">${item.location}</td><td class="px-4 py-3"><span class="inline-flex px-2 py-1 rounded-xl text-xs font-bold ${crit?'bg-red-50 text-red-800 animate-pulse border border-red-100':'bg-stone-100 text-stone-700'}">${item.quantity} un</span></td><td class="px-4 py-3 text-stone-400 font-light max-w-xs truncate">${item.notes||'-'}</td><td class="px-4 py-3 text-right"><div class="flex items-center justify-end gap-1">${hasWrite?`<button onclick="adjustQuantity('${item.id}',-1)" class="px-2 py-1 bg-stone-100 hover:bg-stone-200 rounded-lg font-bold text-stone-700 text-xs">−</button><button onclick="adjustQuantity('${item.id}',1)" class="px-2 py-1 bg-stone-100 hover:bg-stone-200 rounded-lg font-bold text-stone-700 text-xs">+</button><button onclick="deleteStockItem('${item.id}')" class="ml-1 text-xs text-stone-400 hover:text-red-600 font-medium">Excluir</button>`:''}</div></td></tr>`;
    }).join('') : `<tr><td colspan="6" class="px-4 py-8 text-center text-stone-400 text-xs">Nenhum insumo encontrado.</td></tr>`;

    container.innerHTML = `
        <div class="mb-6 flex flex-col md:flex-row justify-between items-start gap-2">
            <div><h1 class="font-cinzel text-2xl font-bold text-stone-900">Almoxarifado</h1><p class="text-xs text-stone-500">Controle de materiais litúrgicos</p></div>
            ${hasWrite?`<button onclick="openStockItemModal()" class="px-4 py-2 bg-stone-900 text-white text-xs font-bold rounded-xl uppercase shadow">Novo Insumo</button>`:''}
        </div>
        <div class="bg-white p-5 rounded-2xl border border-stone-200 shadow-sm space-y-4">
            <div class="relative max-w-md">
                <input type="text" value="${stockSearch}" oninput="searchStock(this.value)" class="w-full pl-10 pr-4 py-2 bg-stone-50 border border-stone-200 rounded-xl text-xs focus:outline-none" placeholder="Buscar insumo, categoria ou localização...">
                <span class="absolute left-3 top-2.5 text-stone-400 text-xs">🔍</span>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead><tr class="bg-stone-50 text-[10px] font-bold uppercase tracking-wider text-stone-400 border-b border-stone-200"><th class="px-4 py-3">Insumo</th><th class="px-4 py-3">Categoria</th><th class="px-4 py-3">Localização</th><th class="px-4 py-3">Qtd</th><th class="px-4 py-3">Observações</th><th class="px-4 py-3"></th></tr></thead>
                    <tbody>${listHTML}</tbody>
                </table>
            </div>
        </div>`;
}
function searchStock(v) { stockSearch=v; renderCurrentTab(); }
function adjustQuantity(id, v) {
    const item = appState.stock.find(i=>i.id===id);
    if (!item) return;
    item.quantity = Math.max(0, item.quantity+v);
    saveState(); addLog(`Ajustou estoque: ${item.name} → ${item.quantity}`);
    if (item.quantity <= item.minQuantity) showNotification('Estoque Baixo', `${item.name} atingiu o mínimo.`, 'warning');
    renderCurrentTab();
}
function deleteStockItem(id) {
    const i = appState.stock.findIndex(x=>x.id===id);
    if (i!==-1) { const n=appState.stock[i].name; appState.stock.splice(i,1); saveState(); addLog(`Removeu insumo: ${n}`); showNotification('Removido',n,'warning'); renderCurrentTab(); }
}
function openStockItemModal() {
    const opts = appState.stockCategories.map(c=>`<option value="${c}">${c}</option>`).join('');
    openModal('Cadastrar Novo Insumo',`<form onsubmit="handleNewStockItem(event)" class="space-y-4 text-xs">
        <div><label class="block font-bold text-stone-500 uppercase mb-1">Nome do Insumo</label><input type="text" id="s-name" required class="w-full p-2.5 bg-stone-50 border border-stone-200 rounded-xl focus:outline-none"></div>
        <div class="grid grid-cols-2 gap-4"><div><label class="block font-bold text-stone-500 uppercase mb-1">Categoria</label><div class="flex gap-2"><select id="s-cat" required class="flex-1 p-2.5 bg-stone-50 border border-stone-200 rounded-xl focus:outline-none">${opts}</select><button type="button" onclick="promptNewCategory('stock')" class="px-2 bg-stone-100 rounded-xl font-bold">+</button></div></div><div><label class="block font-bold text-stone-500 uppercase mb-1">Localização</label><input type="text" id="s-loc" required class="w-full p-2.5 bg-stone-50 border border-stone-200 rounded-xl focus:outline-none"></div></div>
        <div class="grid grid-cols-2 gap-4"><div><label class="block font-bold text-stone-500 uppercase mb-1">Quantidade</label><input type="number" min="0" id="s-qty" required class="w-full p-2.5 bg-stone-50 border border-stone-200 rounded-xl focus:outline-none"></div><div><label class="block font-bold text-stone-500 uppercase mb-1">Mínimo Crítico</label><input type="number" min="0" id="s-min" required class="w-full p-2.5 bg-stone-50 border border-stone-200 rounded-xl focus:outline-none"></div></div>
        <div><label class="block font-bold text-stone-500 uppercase mb-1">Observações</label><textarea id="s-notes" class="w-full p-2.5 bg-stone-50 border border-stone-200 rounded-xl focus:outline-none h-16"></textarea></div>
        <div class="pt-4 flex justify-end gap-2 border-t border-stone-100"><button type="button" onclick="closeModal()" class="px-4 py-2 bg-stone-100 text-stone-600 rounded-xl font-bold">Cancelar</button><button type="submit" class="px-4 py-2 bg-stone-900 text-white rounded-xl font-bold">Salvar</button></div>
    </form>`);
}
function handleNewStockItem(e) {
    e.preventDefault();
    const name = document.getElementById('s-name').value.trim();
    if (appState.stock.some(i=>i.name.toLowerCase()===name.toLowerCase())) { showNotification('Duplicado','Insumo já cadastrado.','error'); return; }
    appState.stock.push({ id:'s'+Date.now(), name, category:document.getElementById('s-cat').value, location:document.getElementById('s-loc').value.trim(), quantity:parseInt(document.getElementById('s-qty').value), minQuantity:parseInt(document.getElementById('s-min').value), notes:document.getElementById('s-notes').value.trim() });
    saveState(); addLog(`Cadastrou insumo: ${name}`); closeModal(); showNotification('Adicionado',name,'success'); renderCurrentTab();
}

// ---- COZINHA ----
function renderCozinha(container, hasWrite) {

        const items = appState.foods.filter(f=>f.location===fr.id).map(f=>`<div class="flex justify-between items-center py-2 border-b border-stone-100 last:border-0 text-xs"><div><span class="font-medium text-stone-700 block">${f.name}</span><span class="text-[9px] text-stone-400">Vence: ${f.expiry}</span></div><div class="flex items-center gap-2"><span class="font-bold text-stone-700 text-[10px]">${f.weight}</span>${hasWrite?`<button onclick="deleteFood('${f.id}')" class="text-xs text-stone-400 hover:text-red-600">Excluir</button>`:''}</div></div>`).join('') || '<span class="text-xs text-stone-400 block py-4 text-center">Freezer vazio.</span>';
        return `<div class="bg-white p-5 rounded-2xl border border-stone-200 shadow-sm"><div class="flex justify-between items-center border-b border-stone-100 pb-3 mb-3"><span class="font-cinzel text-xs font-bold text-stone-900">❄️ ${fr.name}</span>${hasWrite?`<button onclick="deleteFreezer('${fr.id}')" class="text-[10px] text-red-500 font-semibold">Remover</button>`:''}</div><div class="space-y-1 max-h-[180px] overflow-y-auto">${items}</div></div>`;
    }).join('') || '<div class="col-span-full p-8 bg-white border border-dashed border-stone-200 rounded-2xl text-center text-stone-400 text-xs">Nenhum freezer cadastrado.</div>';

            ${hasWrite?`<div class="flex gap-2"><button onclick="openFreezerModal()" class="px-3 py-2 border border-stone-300 text-stone-700 text-xs font-bold rounded-xl hover:bg-stone-100 uppercase">Criar Freezer</button><button onclick="openFoodModal()" class="px-4 py-2 bg-stone-900 text-white text-xs font-bold rounded-xl uppercase shadow">Adicionar Alimento</button></div>`:''}
        </div>
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="lg:col-span-1 bg-white p-5 rounded-2xl border border-stone-200 shadow-sm"><h3 class="font-cinzel text-sm font-bold text-stone-900 border-b border-stone-100 pb-3 mb-4">🌾 Despensa Seca</h3><div class="space-y-2 max-h-[450px] overflow-y-auto">${dry}</div></div>
            <div class="lg:col-span-2 space-y-4"><h3 class="font-cinzel text-sm font-bold text-stone-900 border-b border-stone-200 pb-2">Equipamentos de Conservação</h3><div class="grid grid-cols-1 md:grid-cols-2 gap-4">${freezersHTML}</div></div>
        </div>`;
}
function deleteFood(id) {
    const i=appState.foods.findIndex(f=>f.id===id);
    if(i!==-1){const n=appState.foods[i].name;appState.foods.splice(i,1);saveState();addLog(`Removeu alimento: ${n}`);showNotification('Removido',n,'warning');renderCurrentTab();}
}
function deleteFreezer(id) {
    if(appState.foods.some(f=>f.location===id)){showNotification('Freezer com itens','Esvazie o freezer antes de remover.','error');return;}
    const i=appState.freezers.findIndex(f=>f.id===id);
    if(i!==-1){const n=appState.freezers[i].name;appState.freezers.splice(i,1);saveState();addLog(`Removeu freezer: ${n}`);showNotification('Freezer Removido',n,'warning');renderCurrentTab();}
}
function openFreezerModal() {

function handleNewFreezer(e){e.preventDefault();appState.freezers.push({id:'f'+Date.now(),name:document.getElementById('f-name').value.trim()});saveState();closeModal();showNotification('Freezer criado','','success');renderCurrentTab();}
function openFoodModal() {

function handleNewFood(e){e.preventDefault();appState.foods.push({id:'fo'+Date.now(),name:document.getElementById('fo-name').value.trim(),weight:document.getElementById('fo-weight').value.trim(),expiry:document.getElementById('fo-expiry').value,location:document.getElementById('fo-loc').value});saveState();closeModal();showNotification('Alimento adicionado','','success');renderCurrentTab();}

let fabricSearch='';

// ---- SECRETARIA ----
function renderSecretaria(container, hasWrite) {
    const notices = appState.notices.map(n => {
        const badge = n.level==='urgente'?'bg-red-50 text-red-800 border-red-100':'festividade'===n.level?'bg-amber-50 text-amber-800 border-amber-200':'bg-stone-100 text-stone-800 border-stone-200';
        return `<div class="p-4 bg-stone-50 rounded-2xl border border-stone-200 flex justify-between items-start gap-3 text-xs"><div><div class="flex items-center gap-2 mb-1"><span class="px-2 py-0.5 rounded-lg text-[10px] font-bold uppercase border ${badge}">${n.level}</span><span class="text-stone-400">${n.date}</span></div><h4 class="font-bold text-stone-900 text-sm mb-1">${n.title}</h4><p class="text-slate-600 leading-relaxed font-light">${n.text}</p></div>${hasWrite?`<button onclick="deleteNotice('${n.id}')" class="text-stone-400 hover:text-red-500 p-1.5 rounded-xl hover:bg-stone-100">✕</button>`:''}</div>`;
    }).join('') || '<div class="p-8 text-center text-stone-400 text-xs border border-dashed border-stone-200 rounded-xl">Sem comunicados.</div>';

    container.innerHTML = `
        <div class="mb-6"><h1 class="font-cinzel text-2xl font-bold text-stone-900">Secretaria & Alertas</h1><p class="text-xs text-stone-500">Cronograma, comunicados e alertas gerais</p></div>
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <div class="lg:col-span-5 space-y-6">
                ${hasWrite?`<div class="bg-white p-5 rounded-2xl border border-stone-200 shadow-sm">
                    <h3 class="font-cinzel text-sm font-bold text-stone-900 border-b border-stone-100 pb-3 mb-4">📅 Escalar Próxima Gira</h3>
                    <form onsubmit="handleNewSchedule(event)" class="space-y-4 text-xs">
                        <div class="grid grid-cols-2 gap-3">
                            <div><label class="block font-bold text-stone-500 uppercase mb-1">Data</label><input type="date" id="g-date" required class="w-full p-2.5 bg-stone-50 border border-stone-200 rounded-xl focus:outline-none"></div>
                            <div><label class="block font-bold text-stone-500 uppercase mb-1">Hora</label><input type="time" id="g-time" required class="w-full p-2.5 bg-stone-50 border border-stone-200 rounded-xl focus:outline-none"></div>
                        </div>
                        <div><label class="block font-bold text-stone-500 uppercase mb-1">Linha de Trabalho</label><input type="text" id="g-line" required class="w-full p-2.5 bg-stone-50 border border-stone-200 rounded-xl focus:outline-none" placeholder="Ex: Gira de Pretos Velhos"></div>
                        <div class="grid grid-cols-2 gap-3">
                            <div><label class="block font-bold text-stone-500 uppercase mb-1">Dirigente</label><input type="text" id="g-dirigente" required class="w-full p-2.5 bg-stone-50 border border-stone-200 rounded-xl focus:outline-none"></div>
                            <div><label class="block font-bold text-stone-500 uppercase mb-1">Vestuário</label><input type="text" id="g-vest" required class="w-full p-2.5 bg-stone-50 border border-stone-200 rounded-xl focus:outline-none"></div>
                        </div>
                        <div><label class="block font-bold text-stone-500 uppercase mb-1">Cor no Calendário</label><input type="color" id="g-color" value="#854d0e" class="w-full h-10 p-1 bg-stone-50 border border-stone-200 rounded-xl cursor-pointer"></div>
                        <div><label class="block font-bold text-stone-500 uppercase mb-1">Recomendações</label><textarea id="g-recom" required class="w-full p-2.5 bg-stone-50 border border-stone-200 rounded-xl focus:outline-none h-16"></textarea></div>
                        <button type="submit" class="w-full py-2.5 bg-stone-900 text-white font-bold rounded-xl uppercase tracking-wider">Confirmar Gira</button>
                    </form>
                </div>
                <div class="bg-white p-5 rounded-2xl border border-stone-200 shadow-sm">
                    <h3 class="font-cinzel text-sm font-bold text-stone-900 border-b border-stone-100 pb-3 mb-4">📢 Disparar Alerta</h3>
                    <form onsubmit="handleNewNotice(event)" class="space-y-4 text-xs">
                        <div class="grid grid-cols-2 gap-3">
                            <div><label class="block font-bold text-stone-500 uppercase mb-1">Título</label><input type="text" id="n-title" required class="w-full p-2.5 bg-stone-50 border border-stone-200 rounded-xl focus:outline-none"></div>
                            <div><label class="block font-bold text-stone-500 uppercase mb-1">Nível</label><select id="n-level" required class="w-full p-2.5 bg-stone-50 border border-stone-200 rounded-xl focus:outline-none"><option value="normal">Normal</option><option value="festividade">Festividade</option><option value="urgente">Urgente</option></select></div>
                        </div>
                        <div><label class="block font-bold text-stone-500 uppercase mb-1">Mensagem</label><textarea id="n-text" required class="w-full p-2.5 bg-stone-50 border border-stone-200 rounded-xl focus:outline-none h-16"></textarea></div>
                        <button type="submit" class="w-full py-2.5 bg-stone-900 text-white font-bold rounded-xl uppercase tracking-wider">Publicar</button>
                    </form>
                </div>`:''}
            </div>
            <div class="lg:col-span-7 bg-white p-6 rounded-2xl border border-stone-200 shadow-sm">
                <h3 class="font-cinzel text-sm font-bold text-stone-900 border-b border-stone-100 pb-3 mb-4">Quadro de Avisos</h3>
                <div class="space-y-3 max-h-[600px] overflow-y-auto pr-1">${notices}</div>
            </div>
        </div>`;
}
function handleNewSchedule(e) {
    e.preventDefault();
    appState.schedule.unshift({ id:'sc'+Date.now(), date:document.getElementById('g-date').value, time:document.getElementById('g-time').value, line:document.getElementById('g-line').value.trim(), dirigente:document.getElementById('g-dirigente').value.trim(), vestuario:document.getElementById('g-vest').value.trim(), recomendacoes:document.getElementById('g-recom').value.trim(), color:document.getElementById('g-color').value });
    saveState(); addLog(`Escalou gira: ${document.getElementById('g-line').value}`); e.target.reset(); showNotification('Gira Escalada','Cronograma atualizado.','success'); renderCurrentTab();
}
function handleNewNotice(e) {
    e.preventDefault();
    appState.notices.unshift({ id:'n'+Date.now(), title:document.getElementById('n-title').value.trim(), text:document.getElementById('n-text').value.trim(), level:document.getElementById('n-level').value, date:new Date().toISOString().split('T')[0] });
    saveState(); addLog(`Publicou comunicado`); e.target.reset(); showNotification('Comunicado Publicado','','success'); renderCurrentTab();
}
function deleteNotice(id){const i=appState.notices.findIndex(n=>n.id===id);if(i!==-1){appState.notices.splice(i,1);saveState();showNotification('Aviso Excluído','','warning');renderCurrentTab();}}

        <div class="grid grid-cols-2 gap-3">

            <div><label class="block font-bold text-stone-500 uppercase mb-1">Pombagira</label><input type="text" id="cr-pom" value="${c.pombagira||''}" class="w-full p-2.5 bg-stone-50 border border-stone-200 rounded-xl focus:outline-none"></div>
        </div>
        <div class="grid grid-cols-2 gap-3">
            <div><label class="block font-bold text-stone-500 uppercase mb-1">Caboclo</label><input type="text" id="cr-caboclo" value="${c.caboclo||''}" class="w-full p-2.5 bg-stone-50 border border-stone-200 rounded-xl focus:outline-none"></div>
            <div><label class="block font-bold text-stone-500 uppercase mb-1">Boiadeiro</label><input type="text" id="cr-boiadeiro" value="${c.boiadeiro||''}" class="w-full p-2.5 bg-stone-50 border border-stone-200 rounded-xl focus:outline-none"></div>

        <div class="grid grid-cols-2 gap-3">
            <div><label class="block font-bold text-stone-500 uppercase mb-1">Erê</label><input type="text" id="cr-ere" value="${c.ere||''}" class="w-full p-2.5 bg-stone-50 border border-stone-200 rounded-xl focus:outline-none"></div>
            <div><label class="block font-bold text-stone-500 uppercase mb-1">Preto Velho</label><input type="text" id="cr-preto" value="${c.pretoVelho||''}" class="w-full p-2.5 bg-stone-50 border border-stone-200 rounded-xl focus:outline-none"></div>
        </div>
        <div><label class="block font-bold text-stone-500 uppercase mb-1">Data de Aniversário</label><input type="date" id="cr-birthday" value="${u.birthday||''}" class="w-full p-2.5 bg-stone-50 border border-stone-200 rounded-xl focus:outline-none"></div>

function handleCrownUpdate(e, userId) {
    e.preventDefault();
    const u = appState.users.find(x=>x.id===userId);
    if (!u) return;
    u.crown = { orixaFrente:document.getElementById('cr-frente').value.trim(), orixaJunto:document.getElementById('cr-junto').value.trim(), exu:document.getElementById('cr-exu').value.trim(), pombagira:document.getElementById('cr-pom').value.trim(), caboclo:document.getElementById('cr-caboclo').value.trim(), boiadeiro:document.getElementById('cr-boiadeiro').value.trim(), ere:document.getElementById('cr-ere').value.trim(), pretoVelho:document.getElementById('cr-preto').value.trim() };
    u.birthday = document.getElementById('cr-birthday').value;
    if (u.id === appState.currentUser.id) appState.currentUser = u;
    saveState(); addLog(`Atualizou ficha de ${u.name}`); closeModal(); showNotification('Ficha Atualizada',u.name,'success'); renderCurrentTab();
}

// ---- MÓDULO DE PRESENÇA (NOVO) ----
let presencaGiraId = null;
function renderPresenca(container, hasWrite) {
    const sortedGiras = [...appState.schedule].sort((a,b) => a.date.localeCompare(b.date));
    const giraAtual = presencaGiraId ? appState.schedule.find(g=>g.id===presencaGiraId) : sortedGiras[0];
    if (!presencaGiraId && giraAtual) presencaGiraId = giraAtual.id;

    const giraSelector = appState.schedule.length ? `
        <select onchange="changePresencaGira(this.value)" class="px-3 py-2 bg-stone-50 border border-stone-200 rounded-xl text-xs focus:outline-none font-bold">
            ${sortedGiras.map(g=>`<option value="${g.id}" ${g.id===presencaGiraId?'selected':''}>${g.date} — ${g.line}</option>`).join('')}
        </select>` : '<span class="text-xs text-stone-400">Nenhuma gira escalada. Vá à Secretaria para escalar.</span>';

    let listHTML = '';
    let totalPresentes = 0;
    let totalFaltas = 0;

    if (giraAtual) {
        listHTML = appState.users.map(m => {
            const reg = appState.presencas.find(p=>p.scheduleId===giraAtual.id && p.userId===m.id);
            const presente = reg ? reg.presente : null;
            if (presente === true) totalPresentes++;
            else if (presente === false) totalFaltas++;
            
            return `<div class="flex items-center justify-between p-4 rounded-2xl border border-stone-100 bg-white text-xs hover:border-stone-200 transition-all">
                <div class="flex-1 min-w-0 pr-4">
                    <span class="font-bold text-stone-800 block">${m.name}</span>
                    <span class="text-[10px] text-stone-400 uppercase">${m.cargo}</span>
                </div>
                ${hasWrite ? `<div class="flex items-center gap-2 shrink-0">
                    <button onclick="setPresenca('${giraAtual.id}','${m.id}',true)" class="px-3 py-1.5 rounded-xl font-bold text-[10px] transition-all ${presente===true?'bg-emerald-500 text-white':'bg-stone-100 text-stone-600 hover:bg-emerald-50 hover:text-emerald-700'}">✓ Presente</button>
                    <button onclick="setPresenca('${giraAtual.id}','${m.id}',false)" class="px-3 py-1.5 rounded-xl font-bold text-[10px] transition-all ${presente===false?'bg-red-500 text-white':'bg-stone-100 text-stone-600 hover:bg-red-50 hover:text-red-700'}">✗ Faltou</button>
                    ${presente!==null?`<button onclick="clearPresenca('${giraAtual.id}','${m.id}')" class="px-2 py-1.5 rounded-xl font-bold text-[10px] bg-stone-100 text-stone-500 hover:bg-stone-200">—</button>`:''}
                </div>` : `<span class="px-2 py-1 rounded-xl font-bold text-[10px] ${presente===true?'bg-emerald-50 text-emerald-800':presente===false?'bg-red-50 text-red-800':'bg-stone-100 text-stone-500'}">${presente===true?'✓ Presente':presente===false?'✗ Faltou':'Não registrado'}</span>`}
            </div>`;
        }).join('');

        // Histórico de frequência por médium
        const freqHTML = appState.users.map(m => {
            const regs = appState.presencas.filter(p=>p.userId===m.id);
            const pres = regs.filter(p=>p.presente).length;
            const total = regs.length;
            const pct = total>0 ? Math.round(pres/total*100) : null;
            return `<div class="flex items-center justify-between py-2 border-b border-stone-100 last:border-0 text-xs">
                <span class="font-medium text-stone-700 truncate pr-2">${m.name}</span>
                <div class="flex items-center gap-2 shrink-0">
                    ${pct!==null?`<div class="w-16 bg-stone-100 rounded-full h-1.5"><div class="${pct>=75?'bg-emerald-500':pct>=50?'bg-amber-500':'bg-red-500'} h-1.5 rounded-full" style="width:${pct}%"></div></div><span class="font-bold text-stone-700 w-8 text-right">${pct}%</span>`:`<span class="text-stone-400">Sem dados</span>`}
                </div>
            </div>`;
        }).join('');

        var freqSection = `<div class="bg-white p-5 rounded-2xl border border-stone-200 shadow-sm"><h3 class="font-cinzel text-sm font-bold text-stone-900 border-b border-stone-100 pb-3 mb-4">Frequência Histórica</h3><div class="space-y-1 max-h-72 overflow-y-auto">${freqHTML}</div></div>`;
    } else {
        var freqSection = '';
    }

    const registradas = appState.presencas.filter(p=>p.scheduleId===presencaGiraId).length;
    const totalMediuns = appState.users.length;

    container.innerHTML = `
        <div class="mb-6"><h1 class="font-cinzel text-2xl font-bold text-stone-900">Lista de Presença</h1><p class="text-xs text-stone-500">Registro de frequência por gira</p></div>
        ${appState.schedule.length === 0 ? `<div class="bg-white p-12 rounded-2xl border border-dashed border-stone-200 text-center"><p class="text-stone-400 text-sm mb-3">Nenhuma gira escalada ainda.</p><button onclick="switchTab('secretaria')" class="px-4 py-2 bg-stone-900 text-white text-xs font-bold rounded-xl uppercase">Ir para Secretaria</button></div>` : `
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="lg:col-span-2 space-y-4">
                <div class="bg-white p-5 rounded-2xl border border-stone-200 shadow-sm">
                    <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-3 mb-4 pb-4 border-b border-stone-100">
                        <div>
                            <h3 class="font-cinzel text-sm font-bold text-stone-900">Registro de Presença</h3>
                            ${giraAtual?`<p class="text-xs text-stone-500 mt-1">${giraAtual.line} — ${giraAtual.date}</p>`:''}
                        </div>
                        ${giraSelector}
                    </div>
                    ${giraAtual ? `
                    <div class="flex gap-4 mb-4 text-xs">
                        <div class="px-3 py-2 bg-emerald-50 rounded-xl text-emerald-800 font-bold border border-emerald-100">✓ Presentes: ${totalPresentes}</div>
                        <div class="px-3 py-2 bg-red-50 rounded-xl text-red-800 font-bold border border-red-100">✗ Faltas: ${totalFaltas}</div>
                        <div class="px-3 py-2 bg-stone-50 rounded-xl text-stone-600 font-bold border border-stone-200">? Pendente: ${totalMediuns-registradas}</div>
                    </div>
                    <div class="space-y-2">${listHTML}</div>
                    ${hasWrite?`<div class="mt-4 pt-4 border-t border-stone-100 flex gap-2">
                        <button onclick="marcarTodosPresentes('${giraAtual.id}')" class="px-4 py-2 bg-emerald-500 text-white text-xs font-bold rounded-xl">✓ Marcar Todos Presentes</button>
                    </div>`:''}` : '<p class="text-stone-400 text-xs text-center py-8">Selecione uma gira para registrar a presença.</p>'}
                </div>
            </div>
            <div class="space-y-6">
                ${giraAtual?`<div class="bg-gradient-to-br from-stone-900 to-stone-800 text-white p-5 rounded-2xl"><span class="text-[10px] bg-amber-500 text-stone-950 font-bold px-2 py-0.5 rounded-lg uppercase mb-2 inline-block">Gira Selecionada</span><h4 class="font-cinzel text-sm font-bold text-amber-400 mt-1">${giraAtual.line}</h4><div class="mt-3 space-y-1.5 text-xs text-stone-200"><p><strong class="text-stone-300">Data:</strong> ${giraAtual.date}</p><p><strong class="text-stone-300">Hora:</strong> ${giraAtual.time}</p><p><strong class="text-stone-300">Dirigente:</strong> ${giraAtual.dirigente}</p><p><strong class="text-stone-300">Vestuário:</strong> ${giraAtual.vestuario}</p></div></div>`:''}
                ${freqSection}
            </div>
        </div>`}`;
}
function changePresencaGira(id) { presencaGiraId = id; renderCurrentTab(); }
function setPresenca(scheduleId, userId, presente) {
    const existing = appState.presencas.findIndex(p=>p.scheduleId===scheduleId && p.userId===userId);
    if (existing!==-1) appState.presencas[existing].presente = presente;
    else appState.presencas.push({ id:'pr'+Date.now(), scheduleId, userId, presente });
    saveState(); renderCurrentTab();
}
function clearPresenca(scheduleId, userId) {
    const i = appState.presencas.findIndex(p=>p.scheduleId===scheduleId && p.userId===userId);
    if (i!==-1) { appState.presencas.splice(i,1); saveState(); renderCurrentTab(); }
}
function marcarTodosPresentes(scheduleId) {
    appState.users.forEach(u => {
        const i = appState.presencas.findIndex(p=>p.scheduleId===scheduleId && p.userId===u.id);

function copyPixKey(){const k=document.getElementById('pix-key-val');if(!k)return;navigator.clipboard.writeText(k.innerText).then(()=>showNotification('PIX Copiado','','success')).catch(()=>showNotification('Erro ao copiar','','error'));}
function rotateQuote(){const i=Math.floor(Math.random()*defaultQuotes.length);currentQuote=defaultQuotes[i];const b=document.getElementById('quote-box');if(b){b.style.opacity='0';setTimeout(()=>{b.innerText=`"${currentQuote}"`;b.style.opacity='1';},150);}}
function simulatePixPayment(){const u=appState.currentUser;if(!u)return;const total=(u.duesItems||[]).reduce((a,i)=>a+i.value,0)||80;u.duesStatus='Em Dia';u.duesItems=[];const gu=appState.users.find(x=>x.id===u.id);if(gu){gu.duesStatus='Em Dia';gu.duesItems=[];}appState.transactions.unshift({id:'t'+Date.now(),type:'entrada',amount:total,category:'Mensalidades',date:new Date().toISOString().split('T')[0],description:`Pagamento PIX — ${u.name}`,user:u.name});saveState();addLog('Efetuou pagamento via PIX');showNotification('Pagamento Recebido',`R$ ${total.toFixed(2)} quitado!`,'success');renderCurrentTab();}

                        <div><label class="block font-bold text-stone-500 uppercase mb-1">URL da Logo</label><input type="url" id="cfg-logo" value="${appState.config.logoUrl||''}" class="w-full p-2.5 bg-stone-50 border border-stone-200 rounded-xl focus:outline-none" placeholder="https://..."></div>

function handleGlobalConfig(e) {
    e.preventDefault();
    appState.config.terreiroName = document.getElementById('cfg-name').value.trim();
    appState.config.subtitle = document.getElementById('cfg-sub').value.trim();
    appState.config.pixKey = document.getElementById('cfg-pix').value.trim();
    appState.config.logoUrl = document.getElementById('cfg-logo').value.trim();
    saveState(); addLog('Atualizou configurações do terreiro');
    document.getElementById('sidebar-title').innerText = appState.config.terreiroName;
    document.getElementById('sidebar-subtitle').innerText = appState.config.subtitle;
    updateLogos(); showNotification('Configurações Salvas','','success');
}
function openEditPermissionModal(userId) {
    const u = appState.users.find(x=>x.id===userId);
    if (!u) return;
    const allTabs = Object.keys(TABS_CONFIG);
    const cargos = ['ADMIN','PRESIDENTE','TESOUREIRO','SECRETARIA','CAMBONAGEM','COZINHA','TECIDOS','MEDIUM'];
    const checks = allTabs.map(t=>`<label class="flex items-center gap-2 p-2 bg-stone-50 rounded-xl hover:bg-stone-100 cursor-pointer"><input type="checkbox" name="perm-tabs" value="${t}" ${(u.allowedTabs||[]).includes(t)?'checked':''} class="w-3.5 h-3.5 accent-amber-600"><span class="text-xs font-medium">${TABS_CONFIG[t].label}</span></label>`).join('');
    openModal(`Permissões: ${u.name}`,`<form onsubmit="handlePermissionUpdate(event,'${userId}')" class="space-y-4 text-xs">
        <div><label class="block font-bold text-stone-500 uppercase mb-1">Cargo</label><select id="perm-cargo" class="w-full p-2.5 bg-stone-50 border border-stone-200 rounded-xl focus:outline-none">${cargos.map(c=>`<option value="${c}" ${u.cargo===c?'selected':''}>${c}</option>`).join('')}</select></div>
        <div><label class="block font-bold text-stone-500 uppercase mb-2">Módulos Liberados</label><div class="grid grid-cols-2 gap-1">${checks}</div></div>
        <div class="pt-4 flex justify-end gap-2 border-t border-stone-100"><button type="button" onclick="closeModal()" class="px-4 py-2 bg-stone-100 text-stone-600 rounded-xl font-bold">Cancelar</button><button type="submit" class="px-4 py-2 bg-stone-900 text-white rounded-xl font-bold">Salvar</button></div>
    </form>`);
}
function handlePermissionUpdate(e, userId) {
    e.preventDefault();
    const u = appState.users.find(x=>x.id===userId);
    if (!u) return;
    u.cargo = document.getElementById('perm-cargo').value;
    u.allowedTabs = [...document.getElementsByName('perm-tabs')].filter(c=>c.checked).map(c=>c.value);
    saveState(); addLog(`Atualizou permissões de ${u.name}`); closeModal(); showNotification('Permissões Atualizadas',u.name,'success'); renderCurrentTab();
}

// Alterar senha via modal (sem window.prompt!)
function openChangePasswordModal(userId) {
    const u = appState.users.find(x=>x.id===userId);
    if (!u) return;
    openModal(`Alterar Senha: ${u.name}`,`<form onsubmit="handleChangePassword(event,'${userId}')" class="space-y-4 text-xs">
        <div><label class="block font-bold text-stone-500 uppercase mb-1">Nova Senha</label><input type="password" id="pwd-new" required minlength="4" class="w-full p-2.5 bg-stone-50 border border-stone-200 rounded-xl focus:outline-none" placeholder="Mínimo 4 caracteres"></div>
        <div><label class="block font-bold text-stone-500 uppercase mb-1">Confirmar Nova Senha</label><input type="password" id="pwd-confirm" required class="w-full p-2.5 bg-stone-50 border border-stone-200 rounded-xl focus:outline-none"></div>
        <div class="pt-4 flex justify-end gap-2 border-t border-stone-100"><button type="button" onclick="closeModal()" class="px-4 py-2 bg-stone-100 text-stone-600 rounded-xl font-bold">Cancelar</button><button type="submit" class="px-4 py-2 bg-stone-900 text-white rounded-xl font-bold">Alterar Senha</button></div>
    </form>`);
}
async function handleChangePassword(e, userId) {
    e.preventDefault();
    const n = document.getElementById('pwd-new').value;
    const c = document.getElementById('pwd-confirm').value;
    if (n !== c) { showNotification('Erro','As senhas não conferem.','error'); return; }
    if (n.length < 4) { showNotification('Erro','Senha muito curta (mínimo 4 caracteres).','error'); return; }
    const u = appState.users.find(x=>x.id===userId);
    if (!u) return;
    u.passwordHash = await hashPassword(n);
    saveState(); addLog(`Alterou senha de ${u.name}`); closeModal(); showNotification('Senha Alterada',u.name,'success');
}

function openCreateUserModal() {
    const cargos = ['ADMIN','PRESIDENTE','TESOUREIRO','SECRETARIA','CAMBONAGEM','COZINHA','TECIDOS','MEDIUM'];
    const allTabs = Object.keys(TABS_CONFIG);
    const checks = allTabs.map(t=>`<label class="flex items-center gap-2 p-1.5 bg-stone-50 rounded-xl hover:bg-stone-100 cursor-pointer"><input type="checkbox" name="new-tabs" value="${t}" class="w-3.5 h-3.5 accent-amber-600"><span class="text-[10px] font-medium">${TABS_CONFIG[t].label}</span></label>`).join('');

            <div><label class="block font-bold text-stone-500 uppercase mb-1">Usuário (login)</label><input type="text" id="nu-username" required class="w-full p-2.5 bg-stone-50 border border-stone-200 rounded-xl focus:outline-none"></div>
        </div>
        <div class="grid grid-cols-2 gap-3">
            <div><label class="block font-bold text-stone-500 uppercase mb-1">Senha</label><input type="password" id="nu-pass" required minlength="4" class="w-full p-2.5 bg-stone-50 border border-stone-200 rounded-xl focus:outline-none"></div>
            <div><label class="block font-bold text-stone-500 uppercase mb-1">Cargo</label><select id="nu-cargo" class="w-full p-2.5 bg-stone-50 border border-stone-200 rounded-xl focus:outline-none">${cargos.map(c=>`<option>${c}</option>`).join('')}</select></div>

    </form>`);
}
async function handleCreateUser(e) {
    e.preventDefault();
    const username = document.getElementById('nu-username').value.trim().toLowerCase();
    if (appState.users.some(u=>u.username.toLowerCase()===username)) { showNotification('Erro','Nome de usuário já existe.','error'); return; }
    const pass = document.getElementById('nu-pass').value;
    const tabs = [...document.getElementsByName('new-tabs')].filter(c=>c.checked).map(c=>c.value);
    const newUser = { id:'u'+Date.now(), username, passwordHash: await hashPassword(pass), name:document.getElementById('nu-name').value.trim(), cargo:document.getElementById('nu-cargo').value, allowedTabs:tabs, crown:{}, duesStatus:'Em Dia', duesItems:[], birthday:'' };
    appState.users.push(newUser);
    saveState(); addLog(`Cadastrou médium: ${newUser.name}`); closeModal(); showNotification('Médium Cadastrado',newUser.name,'success'); renderCurrentTab();
}
function deleteUser(id) {
    if (id === appState.currentUser?.id) { showNotification('Erro','Você não pode excluir seu próprio usuário.','error'); return; }
    openModal('Confirmar Exclusão',`<div class="space-y-4 text-xs"><div class="p-4 bg-red-50 border border-red-200 rounded-xl"><p class="font-bold text-red-800">⚠️ Esta ação é irreversível</p><p class="text-red-700 mt-1">Todos os dados do médium serão apagados.</p></div><div class="pt-4 flex justify-end gap-2"><button onclick="closeModal()" class="px-4 py-2 bg-stone-100 text-stone-600 rounded-xl font-bold">Cancelar</button><button onclick="confirmDeleteUser('${id}')" class="px-4 py-2 bg-red-600 text-white rounded-xl font-bold">Confirmar Exclusão</button></div></div>`);
}
function confirmDeleteUser(id) {
    const i=appState.users.findIndex(u=>u.id===id);
    if(i!==-1){const n=appState.users[i].name;appState.users.splice(i,1);saveState();addLog(`Excluiu médium: ${n}`);closeModal();showNotification('Médium Excluído',n,'warning');renderCurrentTab();}
}

// MODAL

function openModal(title, bodyHTML) {
    document.getElementById('modal-title').innerText = title;
    document.getElementById('modal-body').innerHTML = bodyHTML;
    document.getElementById('global-modal').classList.remove('hidden');
}
function closeModal() {
    document.getElementById('global-modal').classList.add('hidden');
    document.getElementById('modal-body').innerHTML = '';
}
document.getElementById('global-modal').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
});
